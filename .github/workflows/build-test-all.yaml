name: Build Test All

on:
  pull_request:
    branches:
      - master
jobs:
  build-test-all:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: List added files
      run: git diff-tree --no-commit-id --name-only -r ${{ github.sha }}
    
    - name: Build Test All
      run: |
        python3 -m pip install -U platformio
        ./qa/build-test-all
