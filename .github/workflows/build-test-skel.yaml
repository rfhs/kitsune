name: Build Test Skel

on:
  pull_request:
    branches:
      - main
jobs:
  build-test-skel:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: List added files
      run: git diff-tree --no-commit-id --name-only -r ${{ github.sha }}
    
    - name: Build Test Skel
      run: |
        ./qa/build-test-skel
